services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./configs/.env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend/app:/app
    networks:
      - drone-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - drone-net

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drone_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drone_secret}
      POSTGRES_DB: ${POSTGRES_DB:-drone_station}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U drone_admin -d drone_station" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drone-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drone-net

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - drone-net

volumes:
  timescaledb_data:
  redis_data:
  minio_data:


networks:
  drone-net:
    driver: bridge
